<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkateHub | Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./style/global.css">
    <link rel="stylesheet" href="./style/shop.css">
</head>
<body>

<div class="navbar">
    <div class="logo">
        <a href="home.html" class="logo-link">
            <img src="9037278.png" alt="Logo">
            <span class="site-title">SkateHub</span>
        </a>
    </div>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="events.html">Events</a>
        <a href="shop.html">Shop</a>
        <a href="tutorials.html">Tutorials</a>
    </div>
    <div class="nav-icons">
        <a href="favorites.html" style="position:relative"><i class="fas fa-star"></i><span id="fav-count" class="badge">0</span></a>
        <a href="cart.html" style="position:relative"><i class="fas fa-shopping-cart"></i><span id="cart-count" class="badge">0</span></a>
        <a href="login.html"><i class="fas fa-user"></i></a>
    </div>
</div>

<div class="main-section">
    <h1>SkateHub</h1>
    <h2>Premium Skating Gear</h2>
</div>

<div class="section">
    <div class="section-header"><h2>Skates</h2><a href="#">View All</a></div>
    <div class="products">
        <div class="product-card">
            <img src="skateboard.jpg"><h3>Classic Skateboard</h3><p>$120</p>
            <div class="product-actions">
                <button class="btn-action btn-cart" onclick="addToCart('Classic Skateboard', 120, 'skateboard.jpg')"><i class="fas fa-cart-plus"></i></button>
                <button class="btn-action btn-fav" onclick="addToFav('Classic Skateboard', 120, 'skateboard.jpg')"><i class="fas fa-star"></i></button>
            </div>
        </div>
        <div class="product-card">
            <img src="roller.jpg"><h3>Pro Roller Skates</h3><p>$90</p>
            <div class="product-actions">
                <button class="btn-action btn-cart" onclick="addToCart('Pro Roller Skates', 90, 'roller.jpg')"><i class="fas fa-cart-plus"></i></button>
                <button class="btn-action btn-fav" onclick="addToFav('Pro Roller Skates', 90, 'roller.jpg')"><i class="fas fa-star"></i></button>
            </div>
        </div>
        </div>
</div>

<div class="section">
    <div class="section-header"><h2>Apparel</h2><a href="#">View All</a></div>
    <div class="products">
        <div class="product-card">
            <img src="tshirt1.jpg"><h3>Graphic Skate Tee</h3><p>$30</p>
            <div class="product-actions">
                <button class="btn-action btn-cart" onclick="addToCart('Graphic Skate Tee', 30, 'tshirt1.jpg')"><i class="fas fa-cart-plus"></i></button>
                <button class="btn-action btn-fav" onclick="addToFav('Graphic Skate Tee', 30, 'tshirt1.jpg')"><i class="fas fa-star"></i></button>
            </div>
        </div>
    </div>
</div>

<script src="js/shop.js"></script>
</body>
</html>
