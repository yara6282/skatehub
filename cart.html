<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cart - SkateHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./style/global.css">
    <link rel="stylesheet" href="./style/shop.css">
</head>
<body>
    <div class="navbar"> </div>

    <div class="main-section">
        <h1>Shopping Cart 🛒</h1>
        <div id="cart-items" class="products"></div>
        <h2 id="total-price" style="margin-top:20px;">Total: $0</h2>
        <button onclick="clearCart()" style="background:red; color:white; padding:10px; border-radius:5px; border:none; cursor:pointer;">Clear Cart</button>
    </div>

    <script src="js/shop.js"></script>
    <script>
        const container = document.getElementById('cart-items');
        let total = 0;
        cart.forEach((item, index) => {
            total += item.price;
            container.innerHTML += `
                <div class="product-card">
                    <img src="${item.image}">
                    <h3>${item.name}</h3>
                    <p>$${item.price}</p>
                    <button onclick="removeCartItem(${index})" class="add-to-cart-btn">Remove</button>
                </div>`;
        });
        document.getElementById('total-price').innerText = "Total: $" + total;

        function removeCartItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            location.reload();
        }
        function clearCart() {
            localStorage.removeItem('cart');
            location.reload();
        }
    </script>
</body>
</html>
