<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkateHub | عالم التزلج</title>
    <link rel="stylesheet" href="./style/first.css">
    <!-- مكتبات الأنميشن -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <!-- الواجهة الأولى: الخلفية واللوح الطائر -->
    <section class="hero">
        <div class="overlay"></div>
        <div class="header-content">
            <img src="./image/avuvac56q.webp" id="floating-board" alt="Skateboard">
            <h1 id="main-title">SKATE<span>HUB</span></h1>
        </div>
    </section>

    <!-- الواجهة الثانية: القفزة والعبارة المحفزة -->
    <section class="motivation">
        <div class="quote-container">
            <p class="quote">"السقوط مجرد جزء من الرحلة، الوقوف هو الفن الحقيقي."</p>
            <img src="./image/kisspng-skateboarding-wall-decal-sticker-extreme-sport-skate-5b23e7b76550d8.544251361529079735415.jpg" id="jumping-skater" alt="Jumping Skater">
        </div>
    </section>

    <!-- الواجهة الثالثة: النهاية والتحويل للهوم -->
    <section class="cta-section">
        <div class="final-container">
            <img src="./image/aveilpm8c.webp" id="fixed-skater" alt="Handplant Skater">
            <div id="join-box" class="hidden">
                <h2>جاهز للتحدي؟</h2>
                <a href="/home" class="btn-join">انضم إلينا (JOIN US)</a>
            </div>
        </div>
    </section>

    <script src="./java/first.js"></script>
</body>
</html>
